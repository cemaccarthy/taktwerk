<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Taktwerk</title>
  <link rel="manifest" href="/taktwerk/manifest.json">
  <link rel="apple-touch-icon" href="/taktwerk/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, system-ui, sans-serif; 
      background: #ffffff; 
      color: #1d1d1f;
      min-height: 100dvh; 
      padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 160px);
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 { margin-bottom: 20px; }
    
    .import-btn {
      background: #007aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      width: 100%;
      max-width: 300px;
    }
    .import-btn:active { opacity: 0.8; }

    #library {
      width: 100%;
      max-width: 600px;
      list-style: none;
    }
    .song-item {
      background: #f5f5f7;
      padding: 14px 16px;
      margin-bottom: 8px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.15s ease;
    }
    .song-item.pressing {
      background: #c7c7cc;
      transition: background 0.4s ease;
    }
    .song-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .song-name { font-weight: 500; font-size: 16px; }
    .song-duration { font-size: 13px; color: #6e6e73; margin-top: 2px; }
    .status-msg { margin-top: 10px; font-size: 14px; color: #6e6e73; }

    .overlay {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      background: rgba(0,0,0,0.4);
      z-index: 9999 !important;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .overlay.active {
      display: flex !important;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .action-sheet {
      background: #ffffff;
      border-radius: 14px;
      width: 280px;
      overflow: hidden;
      animation: scaleIn 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
    }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .action-sheet-title {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: #6e6e73;
      border-bottom: 1px solid #e5e5ea;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-user-select: none;
      user-select: none;
    }
    .action-sheet button {
      width: 100%;
      padding: 16px;
      border: none;
      background: none;
      font-size: 17px;
      cursor: pointer;
      border-bottom: 1px solid #e5e5ea;
      font-family: inherit;
      color: #1d1d1f;
      -webkit-user-select: none;
      user-select: none;
    }
    .action-sheet button:last-child { border-bottom: none; }
    .action-sheet button:active { background: #f5f5f7; }
    .btn-danger { color: #ff3b30 !important; }

    .rename-modal {
      background: #ffffff;
      border-radius: 14px;
      width: 300px;
      padding: 24px;
      animation: scaleIn 0.2s ease;
    }
    .rename-modal h3 { font-size: 17px; margin-bottom: 4px; }
    .rename-modal input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      margin: 12px 0;
      font-family: inherit;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }
    .rename-modal input:focus { border-color: #007aff; }
    .rename-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .rename-modal-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-cancel { background: #f5f5f7; color: #1d1d1f; }
    .btn-save { background: #007aff; color: #ffffff; }

    #player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-top: 1px solid #e5e5ea;
      padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
      display: none;
      flex-direction: column;
      gap: 14px;
      z-index: 100;
    }
    #player-bar.active { display: flex; }
    .player-song-name { 
      font-weight: 600; font-size: 18px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center; width: 100%;
    }
    .player-times { color: #6e6e73; font-variant-numeric: tabular-nums; font-size: 16px; text-align: center; }
    .progress-container {
      width: 100%; height: 32px;
      display: flex; align-items: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .progress-track {
      width: 100%; height: 6px;
      background: #e5e5ea; border-radius: 3px;
      position: relative; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #007aff; border-radius: 3px;
      width: 0%; transition: width 0.1s linear;
    }
    .player-controls { display: flex; justify-content: center; align-items: center; gap: 24px; }
    .control-btn {
      background: none; border: none; cursor: pointer; padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .control-btn svg { width: 36px; height: 36px; fill: #007aff; }
    .control-btn:active svg { opacity: 0.6; }
  </style>
</head>
<body>
  <h1>Taktwerk</h1>
  
  <input type="file" id="audioPicker" multiple 
         accept="audio/mpeg, audio/mp3, audio/aac, audio/wav, audio/flac, audio/ogg, .mp3, .aac, .wav, .flac, .ogg, .m4a" 
         style="display:none">
  <button id="importBtn" class="import-btn">Import Songs</button>
  
  <div id="status" class="status-msg"></div>
  <ul id="library"></ul>

  <div id="action-overlay" class="overlay">
    <div class="action-sheet">
      <div class="action-sheet-title" id="action-sheet-title"></div>
      <button id="action-rename">Rename</button>
      <button id="action-delete" class="btn-danger">Delete</button>
      <button id="action-cancel">Cancel</button>
    </div>
  </div>

  <div id="rename-overlay" class="overlay">
    <div class="rename-modal">
      <h3>Rename Song</h3>
      <input type="text" id="rename-input" autocomplete="off">
      <div class="rename-modal-actions">
        <button class="btn-cancel" id="rename-cancel">Cancel</button>
        <button class="btn-save" id="rename-save">Save</button>
      </div>
    </div>
  </div>

  <div id="player-bar">
    <span class="player-song-name" id="player-song-name"></span>
    <span class="player-times" id="player-times">00:00 / 00:00</span>
    <div class="progress-container" id="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="player-controls">
      <button class="control-btn" id="play-pause-btn" aria-label="Play/Pause"></button>
    </div>
  </div>
  
  <script type="module" src="/taktwerk/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/taktwerk/sw.js');
    }
  </script>
</body>
</html>
